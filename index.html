<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>分期到账计算器</title>
  <style>
    :root {
      --primary: #1677FF;
      --primary-light: #E6F4FF;
      --primary-gradient: linear-gradient(135deg, #1677FF 0%, #0958D9 100%);
      --bg: #F5F7FA;
      --card: #FFFFFF;
      --text: #1A1A1A;
      --text-secondary: #666666;
      --border: #E8E8E8;
      --success: #52C41A;
      --radius: 16px;
      --shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    [data-theme="jd"] {
      --primary: #E4393C;
      --primary-light: #FFF0F0;
      --primary-gradient: linear-gradient(135deg, #E4393C 0%, #C62828 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    .header {
      background: var(--primary-gradient);
      padding: 32px 20px 48px;
      border-radius: 0 0 24px 24px;
      color: white;
      text-align: center;
    }

    .header h1 { font-size: 22px; font-weight: 600; letter-spacing: 1px; }
    .header p { font-size: 13px; opacity: 0.85; margin-top: 6px; }

    .container { padding: 0 16px; margin-top: -24px; }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title::before {
      content: '';
      width: 4px;
      height: 16px;
      background: var(--primary);
      border-radius: 2px;
    }

    .form-group { margin-bottom: 16px; }
    .form-group:last-child { margin-bottom: 0; }

    .form-label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap .prefix {
      position: absolute;
      left: 14px;
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
    }

    input[type="number"] {
      width: 100%;
      height: 48px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0 14px 0 36px;
      font-size: 16px;
      color: var(--text);
      background: #FAFAFA;
      transition: all 0.2s;
      -webkit-appearance: none;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--card);
    }

    .radio-group { display: flex; gap: 10px; flex-wrap: wrap; }

    .radio-btn {
      flex: 1;
      min-width: 80px;
      position: relative;
    }

    .radio-btn input { position: absolute; opacity: 0; }

    .radio-btn label {
      display: block;
      text-align: center;
      padding: 12px 8px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      background: #FAFAFA;
    }

    .radio-btn input:checked + label {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 600;
    }

    .toggle-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-label { font-size: 14px; color: var(--text); }

    .toggle {
      position: relative;
      width: 50px;
      height: 28px;
    }

    .toggle input { position: absolute; opacity: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #D9D9D9;
      border-radius: 28px;
      transition: 0.3s;
    }

    .toggle-slider::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      left: 2px;
      top: 2px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .toggle input:checked + .toggle-slider { background: var(--primary); }
    .toggle input:checked + .toggle-slider::after { transform: translateX(22px); }

    .calc-btn {
      width: 100%;
      height: 50px;
      border: none;
      border-radius: 14px;
      background: var(--primary-gradient);
      color: white;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
    }

    .calc-btn:active { opacity: 0.85; }

    .result-card {
      background: var(--primary-gradient);
      color: white;
      border-radius: var(--radius);
      padding: 24px 20px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }

    .result-label { font-size: 13px; opacity: 0.9; margin-bottom: 4px; }
    .result-amount { font-size: 36px; font-weight: 700; letter-spacing: -0.5px; }

    .detail-list {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.2);
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .detail-item:last-child { margin-bottom: 0; }

    .detail-item .val { font-weight: 500; }

    .history-card { display: none; }
    .history-card.show { display: block; }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .history-item:last-child { border-bottom: none; }

    .history-left { flex: 1; }
    .history-meta {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .history-amount {
      font-size: 18px;
      font-weight: 600;
      color: var(--primary);
    }

    .history-right {
      text-align: right;
    }

    .history-fee {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .history-tag {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 6px;
      background: var(--primary-light);
      color: var(--primary);
      margin-top: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 32px 0;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .clear-btn {
      display: block;
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      margin-top: 12px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body data-theme="alipay">

  <div class="header">
    <h1>分期到账计算器</h1>
    <p>快速计算商家实际到账金额</p>
  </div>

  <div class="container">
    <!-- 输入区 -->
    <div class="card">
      <div class="card-title">计算参数</div>

      <div class="form-group">
        <label class="form-label">订单金额</label>
        <div class="input-wrap">
          <span class="prefix">¥</span>
          <input type="number" id="amount" placeholder="请输入订单金额" min="0" step="0.01">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">分期方式</label>
        <div class="radio-group">
          <div class="radio-btn">
            <input type="radio" name="method" id="alipay" value="alipay" checked>
            <label for="alipay">花呗分期</label>
          </div>
          <div class="radio-btn">
            <input type="radio" name="method" id="jd" value="jd">
            <label for="jd">白条分期</label>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">分期期数</label>
        <div class="radio-group">
          <div class="radio-btn">
            <input type="radio" name="period" id="p3" value="3" checked>
            <label for="p3">3期</label>
          </div>
          <div class="radio-btn">
            <input type="radio" name="period" id="p6" value="6">
            <label for="p6">6期</label>
          </div>
          <div class="radio-btn">
            <input type="radio" name="period" id="p12" value="12">
            <label for="p12">12期</label>
          </div>
        </div>
      </div>

      <div class="form-group">
        <div class="toggle-wrap">
          <span class="toggle-label">商家贴息</span>
          <label class="toggle">
            <input type="checkbox" id="subsidy">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <button class="calc-btn" id="calcBtn">立即计算</button>
    </div>

    <!-- 结果区 -->
    <div class="result-card hidden" id="resultCard">
      <div class="result-label">实际到账金额</div>
      <div class="result-amount" id="resultAmount">¥0.00</div>
      <div class="detail-list">
        <div class="detail-item">
          <span>订单金额</span>
          <span class="val" id="detailAmount">¥0.00</span>
        </div>
        <div class="detail-item">
          <span>分期方式</span>
          <span class="val" id="detailMethod">-</span>
        </div>
        <div class="detail-item">
          <span>分期期数</span>
          <span class="val" id="detailPeriod">-</span>
        </div>
        <div class="detail-item">
          <span>分期费率</span>
          <span class="val" id="detailRate">-</span>
        </div>
        <div class="detail-item">
          <span>商家贴息</span>
          <span class="val" id="detailSubsidy">-</span>
        </div>
        <div class="detail-item">
          <span>手续费</span>
          <span class="val" id="detailFee">¥0.00</span>
        </div>
      </div>
    </div>

    <!-- 历史记录 -->
    <div class="card history-card" id="historyCard">
      <div class="card-title">最近记录</div>
      <div id="historyList"></div>
      <button class="clear-btn" id="clearBtn">清空记录</button>
    </div>
  </div>

  <script>
    (function() {
      const $ = id => document.getElementById(id);
      const STORAGE_KEY = 'instalment_calc_history';
      const MAX_HISTORY = 10;

      const RATES = {
        alipay: { 3: { subsidy: 0.018, noSubsidy: 0.023 }, 6: { subsidy: 0.045, noSubsidy: 0.045 }, 12: { subsidy: 0.075, noSubsidy: 0.075 } },
        jd:     { 3: { subsidy: 0.018, noSubsidy: 0.023 }, 6: { subsidy: 0.045, noSubsidy: 0.045 }, 12: { subsidy: 0.075, noSubsidy: 0.075 } }
      };

      const METHOD_NAMES = { alipay: '花呗分期', jd: '白条分期' };

      function getHistory() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
      }

      function saveHistory(list) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(list.slice(0, MAX_HISTORY)));
      }

      function formatMoney(n) {
        return '¥' + Number(n).toFixed(2);
      }

      function renderHistory() {
        const list = getHistory();
        const card = $('historyCard');
        const container = $('historyList');

        if (list.length === 0) {
          card.classList.remove('show');
          return;
        }

        card.classList.add('show');
        container.innerHTML = list.map(item => `
          <div class="history-item">
            <div class="history-left">
              <div class="history-meta">${item.time}</div>
              <div class="history-amount">${formatMoney(item.net)}</div>
            </div>
            <div class="history-right">
              <div class="history-fee">手续费 ${formatMoney(item.fee)}</div>
              <span class="history-tag">${item.methodName} · ${item.period}期${item.subsidy ? ' · 商贴' : ''}</span>
            </div>
          </div>
        `).join('');
      }

      function addHistory(record) {
        const list = getHistory();
        list.unshift(record);
        saveHistory(list);
        renderHistory();
      }

      // 主题切换
      document.querySelectorAll('input[name="method"]').forEach(radio => {
        radio.addEventListener('change', () => {
          document.body.setAttribute('data-theme', radio.value);
        });
      });

      // 计算
      $('calcBtn').addEventListener('click', () => {
        const amount = parseFloat($('amount').value);
        if (!amount || amount <= 0) {
          alert('请输入有效的订单金额');
          return;
        }

        const method = document.querySelector('input[name="method"]:checked').value;
        const period = parseInt(document.querySelector('input[name="period"]:checked').value);
        const subsidy = $('subsidy').checked;

        const rateObj = RATES[method][period];
        const rate = subsidy ? rateObj.subsidy : rateObj.noSubsidy;
        const fee = amount * rate;
        const net = subsidy ? amount - fee : amount;

        // 显示结果
        $('resultAmount').textContent = formatMoney(net);
        $('detailAmount').textContent = formatMoney(amount);
        $('detailMethod').textContent = METHOD_NAMES[method];
        $('detailPeriod').textContent = period + '期';
        $('detailRate').textContent = (rate * 100).toFixed(1) + '%';
        $('detailSubsidy').textContent = subsidy ? '是' : '否';
        $('detailFee').textContent = subsidy ? formatMoney(fee) + '（扣除）' : formatMoney(fee);
        $('resultCard').classList.remove('hidden');

        // 保存记录
        const now = new Date();
        const timeStr = `${now.getMonth() + 1}月${now.getDate()}日 ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        addHistory({
          time: timeStr,
          amount,
          method,
          methodName: METHOD_NAMES[method],
          period,
          subsidy,
          rate,
          fee,
          net
        });

        // 滚动到结果
        setTimeout(() => $('resultCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
      });

      // 清空记录
      $('clearBtn').addEventListener('click', () => {
        if (confirm('确定清空所有历史记录吗？')) {
          localStorage.removeItem(STORAGE_KEY);
          renderHistory();
        }
      });

      // 初始化
      renderHistory();
    })();
  </script>
</body>
</html>
